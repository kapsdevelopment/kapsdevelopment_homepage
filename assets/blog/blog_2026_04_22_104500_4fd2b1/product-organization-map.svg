<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Product organization map</title>
  <desc id="desc">A product organization built around customer outcomes, durable product teams, and a shared enabling platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf4" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe" />
      <stop offset="100%" stop-color="#eff6ff" />
    </linearGradient>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <text x="96" y="96" font-size="42" font-weight="800" font-family="Inter, Arial, sans-serif" fill="#0f172a">Product organization turns delivery into durable ownership</text>
  <text x="96" y="138" font-size="24" font-family="Inter, Arial, sans-serif" fill="#475569">The unit of work shifts from temporary project to enduring product capability.</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="410" y="186" width="780" height="132" rx="36" fill="url(#gold)" />
    <text x="486" y="248" font-size="38" font-weight="800" fill="#ffffff">Customer and business outcomes</text>
    <text x="486" y="292" font-size="22" fill="#fffbeb">Growth, trust, service quality, efficiency, compliance, resilience</text>
  </g>

  <g stroke="#2563eb" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M800 318 V380" marker-end="url(#arrow)" />
    <path d="M800 318 C620 318 566 340 470 380" marker-end="url(#arrow)" />
    <path d="M800 318 C980 318 1034 340 1130 380" marker-end="url(#arrow)" />
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="162" y="396" width="392" height="270" rx="34" fill="url(#surface)" stroke="#bfdbfe" stroke-width="2" />
    <rect x="604" y="396" width="392" height="270" rx="34" fill="url(#surface)" stroke="#bfdbfe" stroke-width="2" />
    <rect x="1046" y="396" width="392" height="270" rx="34" fill="url(#surface)" stroke="#bfdbfe" stroke-width="2" />

    <text x="202" y="456" font-size="32" font-weight="800" fill="#0f172a">Acquisition product</text>
    <text x="644" y="456" font-size="32" font-weight="800" fill="#0f172a">Operations product</text>
    <text x="1086" y="456" font-size="32" font-weight="800" fill="#0f172a">Support product</text>

    <rect x="202" y="500" width="312" height="50" rx="18" fill="url(#blue)" />
    <rect x="644" y="500" width="312" height="50" rx="18" fill="url(#blue)" />
    <rect x="1086" y="500" width="312" height="50" rx="18" fill="url(#blue)" />
    <text x="240" y="533" font-size="23" font-weight="700" fill="#1d4ed8">Product, design, engineering, data</text>
    <text x="682" y="533" font-size="23" font-weight="700" fill="#1d4ed8">Product, design, engineering, data</text>
    <text x="1124" y="533" font-size="23" font-weight="700" fill="#1d4ed8">Product, design, engineering, data</text>

    <text x="202" y="590" font-size="22" fill="#475569">Owns the customer journey, experiments,</text>
    <text x="202" y="620" font-size="22" fill="#475569">and conversion flows over time.</text>

    <text x="644" y="590" font-size="22" fill="#475569">Owns the internal workflows, policy logic,</text>
    <text x="644" y="620" font-size="22" fill="#475569">and process automation over time.</text>

    <text x="1086" y="590" font-size="22" fill="#475569">Owns service experience, knowledge,</text>
    <text x="1086" y="620" font-size="22" fill="#475569">resolution quality, and feedback capture.</text>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="224" y="718" width="1152" height="112" rx="34" fill="#0f172a" />
    <text x="276" y="770" font-size="34" font-weight="800" fill="#ffffff">Shared enabling platform</text>
    <text x="276" y="808" font-size="22" fill="#cbd5e1">Design system, identity, security, architecture, data platform, DevEx, observability, AI guardrails</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="84" y="414" width="54" height="214" rx="22" fill="#e2e8f0" />
    <text transform="translate(118 604) rotate(-90)" font-size="22" font-weight="700" fill="#475569">Leadership priorities</text>

    <rect x="1462" y="414" width="54" height="214" rx="22" fill="#e2e8f0" />
    <text transform="translate(1498 606) rotate(-90)" font-size="22" font-weight="700" fill="#475569">User insight</text>
  </g>
</svg>
