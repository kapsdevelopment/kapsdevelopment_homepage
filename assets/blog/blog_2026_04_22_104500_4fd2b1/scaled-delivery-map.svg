<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Scaled delivery map</title>
  <desc id="desc">An original SAFe-like scaled delivery map showing strategy, shared guardrails, multiple value streams, and common governance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <linearGradient id="top" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="platform" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="laneA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="laneB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#ffedd5" />
    </linearGradient>
    <linearGradient id="laneC" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff" />
      <stop offset="100%" stop-color="#ccfbf1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <text x="96" y="96" font-size="42" font-weight="800" font-family="Inter, Arial, sans-serif" fill="#0f172a">Scaled coordination with shared guardrails</text>
  <text x="96" y="138" font-size="24" font-family="Inter, Arial, sans-serif" fill="#475569">An original SAFe-like view: many teams, one direction, common rules, distributed execution.</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="96" y="186" width="1408" height="110" rx="34" fill="url(#top)" />
    <text x="148" y="252" font-size="36" font-weight="800" fill="#ffffff">Enterprise direction</text>
    <text x="536" y="252" font-size="24" fill="#cbd5e1">Vision</text>
    <text x="676" y="252" font-size="24" fill="#cbd5e1">Portfolio priorities</text>
    <text x="938" y="252" font-size="24" fill="#cbd5e1">Funding</text>
    <text x="1076" y="252" font-size="24" fill="#cbd5e1">Risk</text>
    <text x="1188" y="252" font-size="24" fill="#cbd5e1">Compliance</text>

    <rect x="96" y="326" width="1408" height="92" rx="30" fill="url(#platform)" />
    <text x="148" y="382" font-size="34" font-weight="800" fill="#ffffff">Shared guardrails and enabling services</text>
    <text x="744" y="382" font-size="22" fill="#dbeafe">Architecture</text>
    <text x="920" y="382" font-size="22" fill="#dbeafe">Security</text>
    <text x="1068" y="382" font-size="22" fill="#dbeafe">Data</text>
    <text x="1188" y="382" font-size="22" fill="#dbeafe">Design system</text>
    <text x="1388" y="382" font-size="22" fill="#dbeafe" text-anchor="end">DevEx</text>

    <rect x="96" y="456" width="432" height="280" rx="36" fill="url(#laneA)" stroke="#93c5fd" stroke-width="2" />
    <rect x="584" y="456" width="432" height="280" rx="36" fill="url(#laneB)" stroke="#fbbf24" stroke-width="2" />
    <rect x="1072" y="456" width="432" height="280" rx="36" fill="url(#laneC)" stroke="#5eead4" stroke-width="2" />

    <text x="136" y="514" font-size="32" font-weight="800" fill="#0f172a">Value stream A</text>
    <text x="624" y="514" font-size="32" font-weight="800" fill="#0f172a">Value stream B</text>
    <text x="1112" y="514" font-size="32" font-weight="800" fill="#0f172a">Value stream C</text>

    <rect x="136" y="554" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />
    <rect x="136" y="620" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />
    <rect x="136" y="686" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />

    <rect x="624" y="554" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />
    <rect x="624" y="620" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />
    <rect x="624" y="686" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />

    <rect x="1112" y="554" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />
    <rect x="1112" y="620" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />
    <rect x="1112" y="686" width="352" height="52" rx="18" fill="#ffffff" opacity="0.9" />

    <text x="172" y="588" font-size="23" font-weight="700" fill="#1d4ed8">Team A1 - onboarding and acquisition</text>
    <text x="172" y="654" font-size="23" font-weight="700" fill="#1d4ed8">Team A2 - content and campaigns</text>
    <text x="172" y="720" font-size="23" font-weight="700" fill="#1d4ed8">Team A3 - analytics and growth</text>

    <text x="660" y="588" font-size="23" font-weight="700" fill="#b45309">Team B1 - workflow automation</text>
    <text x="660" y="654" font-size="23" font-weight="700" fill="#b45309">Team B2 - core operations systems</text>
    <text x="660" y="720" font-size="23" font-weight="700" fill="#b45309">Team B3 - AI assisted case handling</text>

    <text x="1148" y="588" font-size="23" font-weight="700" fill="#0f766e">Team C1 - service desk experience</text>
    <text x="1148" y="654" font-size="23" font-weight="700" fill="#0f766e">Team C2 - knowledge and guidance</text>
    <text x="1148" y="720" font-size="23" font-weight="700" fill="#0f766e">Team C3 - support insight and feedback</text>

    <rect x="250" y="774" width="1100" height="74" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <text x="318" y="822" font-size="26" font-weight="800" fill="#0f172a">Common operating rhythm:</text>
    <text x="620" y="822" font-size="22" fill="#475569">shared metrics, dependency review, release coordination, community standards, architectural decisions</text>
  </g>
</svg>
