<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Direct in-app subscription architecture card map</title>
  <desc id="desc">A card based high level architecture reference for a direct in-app subscription system, showing mobile app, backend control plane, Apple and Google stores, and operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8efe0" />
      <stop offset="48%" stop-color="#eef8f3" />
      <stop offset="100%" stop-color="#e8f0ff" />
    </linearGradient>
    <linearGradient id="mobile" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#12343b" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="backend" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#ffedd5" />
    </linearGradient>
    <linearGradient id="stores" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="ops" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5" />
      <stop offset="100%" stop-color="#d1fae5" />
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="126%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14" />
    </filter>
    <filter id="soft-shadow" x="-8%" y="-10%" width="116%" height="126%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#0f172a" flood-opacity="0.09" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1460" cy="118" r="170" fill="#ffffff" opacity="0.30" />
  <circle cx="122" cy="772" r="214" fill="#ffffff" opacity="0.26" />
  <path d="M72 158 C342 78 552 160 760 118 C1008 68 1228 28 1528 108" fill="none" stroke="#ffffff" stroke-width="38" stroke-linecap="round" opacity="0.34" />

  <g font-family="Avenir Next, Segoe UI, sans-serif">
    <text x="76" y="86" font-size="42" font-weight="800" fill="#0f172a">Direct subscription architecture</text>
    <text x="76" y="126" font-size="23" fill="#475569">A high-level card map of the moving parts in a direct Apple and Google subscription system.</text>
  </g>

  <g font-family="Avenir Next, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="78" y="178" width="330" height="500" rx="42" fill="url(#mobile)" />
    <text x="120" y="246" font-size="34" font-weight="800" fill="#ffffff">Mobile app</text>
    <text x="120" y="282" font-size="19" fill="#c7f9f1">Starts purchases and asks</text>
    <text x="120" y="308" font-size="19" fill="#c7f9f1">the backend for access.</text>

    <rect x="120" y="348" width="246" height="74" rx="22" fill="#ffffff" opacity="0.97" />
    <text x="148" y="380" font-size="21" font-weight="800" fill="#12343b">Purchase observer</text>
    <text x="148" y="406" font-size="17" fill="#31515a">Runs for the app lifetime</text>

    <rect x="120" y="444" width="246" height="74" rx="22" fill="#ffffff" opacity="0.93" />
    <text x="148" y="476" font-size="21" font-weight="800" fill="#12343b">Paywall UI</text>
    <text x="148" y="502" font-size="17" fill="#31515a">Buy, restore, manage</text>

    <rect x="120" y="540" width="246" height="74" rx="22" fill="#ffffff" opacity="0.93" />
    <text x="148" y="572" font-size="21" font-weight="800" fill="#12343b">Entitlements</text>
    <text x="148" y="598" font-size="17" fill="#31515a">Feature access from API</text>
  </g>

  <g font-family="Avenir Next, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="458" y="154" width="684" height="580" rx="46" fill="url(#backend)" stroke="#fed7aa" stroke-width="2" />
    <text x="512" y="224" font-size="35" font-weight="800" fill="#431407">Backend control plane</text>
    <text x="512" y="260" font-size="20" fill="#9a3412">The source of truth for account access, store state, and auditability.</text>

    <rect x="512" y="310" width="280" height="104" rx="28" fill="#ffffff" stroke="#fdba74" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="548" y="348" font-size="23" font-weight="800" fill="#431407">Verify purchase</text>
    <text x="548" y="376" font-size="18" fill="#7c2d12">Checks Apple JWS, receipt,</text>
    <text x="548" y="402" font-size="18" fill="#7c2d12">or Google purchase token.</text>

    <rect x="830" y="310" width="260" height="104" rx="28" fill="#ffffff" stroke="#fdba74" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="864" y="348" font-size="23" font-weight="800" fill="#431407">Guard update</text>
    <text x="864" y="376" font-size="18" fill="#7c2d12">Decides apply, merge only,</text>
    <text x="864" y="402" font-size="18" fill="#7c2d12">or skip stale signals.</text>

    <rect x="512" y="452" width="280" height="96" rx="28" fill="#fffaf5" stroke="#fb923c" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="548" y="488" font-size="23" font-weight="800" fill="#431407">subscriptions</text>
    <text x="548" y="516" font-size="18" fill="#7c2d12">App-facing snapshot used</text>
    <text x="548" y="542" font-size="18" fill="#7c2d12">by the entitlement API.</text>

    <rect x="830" y="452" width="260" height="96" rx="28" fill="#fffaf5" stroke="#fb923c" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="864" y="488" font-size="23" font-weight="800" fill="#431407">store ledger</text>
    <text x="864" y="516" font-size="18" fill="#7c2d12">Provider-specific memory</text>
    <text x="864" y="542" font-size="18" fill="#7c2d12">for reconciliation.</text>

    <rect x="512" y="586" width="280" height="96" rx="28" fill="#fffaf5" stroke="#fb923c" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="548" y="622" font-size="23" font-weight="800" fill="#431407">event log</text>
    <text x="548" y="650" font-size="18" fill="#7c2d12">Append-only timeline for</text>
    <text x="548" y="676" font-size="18" fill="#7c2d12">debugging and support.</text>

    <rect x="830" y="586" width="260" height="96" rx="28" fill="#fffaf5" stroke="#fb923c" stroke-width="2" filter="url(#soft-shadow)" />
    <text x="864" y="622" font-size="23" font-weight="800" fill="#431407">raw ingress</text>
    <text x="864" y="650" font-size="18" fill="#7c2d12">Original Apple and Google</text>
    <text x="864" y="676" font-size="18" fill="#7c2d12">notification payloads.</text>
  </g>

  <g font-family="Avenir Next, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="1192" y="178" width="330" height="500" rx="42" fill="url(#stores)" stroke="#bfdbfe" stroke-width="2" />
    <text x="1236" y="246" font-size="34" font-weight="800" fill="#0f172a">Apple and Google</text>
    <text x="1236" y="282" font-size="19" fill="#334155">Store systems stay at</text>
    <text x="1236" y="308" font-size="19" fill="#334155">the edges of the app.</text>

    <rect x="1236" y="348" width="244" height="74" rx="22" fill="#ffffff" opacity="0.97" />
    <text x="1264" y="380" font-size="21" font-weight="800" fill="#0f172a">Store sheet</text>
    <text x="1264" y="406" font-size="17" fill="#334155">Native purchase flow</text>

    <rect x="1236" y="444" width="244" height="74" rx="22" fill="#ffffff" opacity="0.94" />
    <text x="1264" y="476" font-size="21" font-weight="800" fill="#0f172a">Server APIs</text>
    <text x="1264" y="502" font-size="17" fill="#334155">Verify current state</text>

    <rect x="1236" y="540" width="244" height="74" rx="22" fill="#ffffff" opacity="0.94" />
    <text x="1264" y="572" font-size="21" font-weight="800" fill="#0f172a">Notifications</text>
    <text x="1264" y="598" font-size="17" fill="#334155">App Store events and RTDN</text>
  </g>

  <g font-family="Avenir Next, Segoe UI, sans-serif" filter="url(#soft-shadow)">
    <rect x="208" y="760" width="1184" height="88" rx="34" fill="url(#ops)" stroke="#86efac" stroke-width="2" />
    <text x="260" y="807" font-size="27" font-weight="800" fill="#064e3b">Operations and repair loop</text>
    <text x="670" y="807" font-size="20" fill="#047857">refresh status, replay notifications, reconcile expired rows, clean raw payloads, support users</text>
  </g>

  <g font-family="Avenir Next, Segoe UI, sans-serif" filter="url(#soft-shadow)">
    <rect x="595" y="68" width="410" height="70" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <text x="642" y="112" font-size="23" font-weight="800" fill="#0f172a">One question for the app: what is active?</text>
  </g>

  <g font-family="Avenir Next, Segoe UI, sans-serif">
    <rect x="78" y="704" width="330" height="44" rx="22" fill="#ffffff" opacity="0.72" />
    <text x="116" y="733" font-size="18" font-weight="800" fill="#0f172a">The app never grants access alone.</text>

    <rect x="1192" y="704" width="330" height="44" rx="22" fill="#ffffff" opacity="0.72" />
    <text x="1234" y="733" font-size="18" font-weight="800" fill="#0f172a">Store signals are inputs, not truth.</text>
  </g>
</svg>
