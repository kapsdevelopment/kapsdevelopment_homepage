<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmation | Kapsdevelopment</title>
    <meta name="description" content="Order confirmation and download access for Kapsdevelopment digital products." />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="canonical" href="https://kapsdevelopment.com/products/success/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="/css/products.css" />
    <script src="/js/products-success.js" defer></script>
  </head>
  <body class="success-page">
    <header class="site-header">
      <div class="container topbar">
        <a class="brand" href="/">
          <span class="brand-mark">KD</span>
          <span class="brand-wordmark">Kapsdevelopment</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/products/">Products</a>
          <a href="/blog/">Blog</a>
        </nav>
      </div>
    </header>

    <main class="success-main">
      <section class="success-panel" aria-live="polite">
        <span class="material-icons success-icon" aria-hidden="true">task_alt</span>
        <p class="eyebrow">Stripe checkout</p>
        <h1 id="success-title">Preparing your download</h1>
        <p id="success-message">
          We are checking the payment session and preparing the download access for your purchased package.
        </p>

        <div id="success-order" class="success-order" hidden>
          <span>Package</span>
          <strong id="success-product-name">Agentic Reference Material</strong>
        </div>

        <div class="success-actions">
          <a id="download-link" class="button primary" href="#" hidden>
            <span class="material-icons" aria-hidden="true">download</span>
            Download ZIP
          </a>
          <a class="button secondary" href="/products/">
            <span class="material-icons" aria-hidden="true">arrow_back</span>
            Back to products
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
