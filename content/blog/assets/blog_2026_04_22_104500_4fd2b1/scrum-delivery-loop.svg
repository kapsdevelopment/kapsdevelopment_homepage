<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Scrum delivery loop</title>
  <desc id="desc">A circular scrum-inspired flow with backlog, planning, build, review, and retrospective feeding continuous learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <text x="96" y="96" font-size="42" font-weight="800" font-family="Inter, Arial, sans-serif" fill="#0f172a">Scrum tightened the delivery loop</text>
  <text x="96" y="138" font-size="24" font-family="Inter, Arial, sans-serif" fill="#475569">Instead of one big plan, teams repeated planning, building, reviewing, and learning.</text>

  <g font-family="Inter, Arial, sans-serif">
    <circle cx="800" cy="500" r="264" fill="none" stroke="url(#accent)" stroke-width="18" stroke-dasharray="940 40" />
    <path d="M1044 425 C1092 462 1104 528 1070 598" fill="none" stroke="#2563eb" stroke-width="0" marker-end="url(#arrow)" />
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <circle cx="800" cy="500" r="152" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <text x="715" y="486" font-size="34" font-weight="800" fill="#0f172a">Working software</text>
    <text x="734" y="530" font-size="30" font-weight="700" fill="#1d4ed8">plus learning</text>

    <rect x="676" y="208" width="248" height="104" rx="28" fill="url(#surface)" stroke="#bfdbfe" stroke-width="2" />
    <text x="748" y="250" font-size="28" font-weight="800" fill="#0f172a">Backlog</text>
    <text x="712" y="286" font-size="21" fill="#475569">Prioritized user and business needs</text>

    <rect x="1086" y="388" width="248" height="104" rx="28" fill="url(#surface)" stroke="#bfdbfe" stroke-width="2" />
    <text x="1134" y="430" font-size="28" font-weight="800" fill="#0f172a">Sprint planning</text>
    <text x="1113" y="466" font-size="21" fill="#475569">Scope the next short delivery loop</text>

    <rect x="966" y="676" width="248" height="104" rx="28" fill="url(#surface)" stroke="#bfdbfe" stroke-width="2" />
    <text x="1038" y="718" font-size="28" font-weight="800" fill="#0f172a">Build</text>
    <text x="992" y="754" font-size="21" fill="#475569">Implement, test, integrate, refine</text>

    <rect x="386" y="676" width="248" height="104" rx="28" fill="url(#surface)" stroke="#bfdbfe" stroke-width="2" />
    <text x="468" y="718" font-size="28" font-weight="800" fill="#0f172a">Review</text>
    <text x="422" y="754" font-size="21" fill="#475569">Show work, gather response, adjust</text>

    <rect x="266" y="388" width="248" height="104" rx="28" fill="url(#surface)" stroke="#bfdbfe" stroke-width="2" />
    <text x="318" y="430" font-size="28" font-weight="800" fill="#0f172a">Retro and learn</text>
    <text x="310" y="466" font-size="21" fill="#475569">Inspect team process and next changes</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="1128" y="196" width="306" height="112" rx="28" fill="#0f172a" opacity="0.96" />
    <text x="1166" y="242" font-size="26" font-weight="800" fill="#ffffff">Key shift from waterfall</text>
    <text x="1166" y="278" font-size="20" fill="#cbd5e1">Feedback arrives every cycle,</text>
    <text x="1166" y="304" font-size="20" fill="#cbd5e1">not only at the end.</text>
  </g>
</svg>
